<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NMi Booth — Lucky Dice</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --nmi-navy: #0a1628;
    --nmi-navy-mid: #112040;
    --nmi-navy-light: #1a3260;
    --nmi-orange: #f47920;
    --nmi-orange-light: #ff9a45;
    --nmi-orange-dark: #c25e10;
    --nmi-white: #ffffff;
    --nmi-gray: #8899bb;
    --nmi-silver: #d0daf0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--nmi-navy);
    font-family: 'Barlow', sans-serif;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Background grid pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(244,121,32,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(244,121,32,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glowing orb bg */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(244,121,32,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 700px;
    padding: 2rem 2rem 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 0.25rem;
  }

  .logo-svg { height: 56px; width: auto; }

  .divider-v {
    width: 1.5px;
    height: 40px;
    background: rgba(244,121,32,0.4);
  }

  .booth-label {
    display: flex;
    flex-direction: column;
  }

  .booth-label .top {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.25em;
    color: var(--nmi-orange);
    text-transform: uppercase;
  }

  .booth-label .title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--nmi-white);
    letter-spacing: 0.04em;
    line-height: 1;
  }

  .tagline {
    font-size: 12px;
    color: var(--nmi-gray);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* ── ORANGE DIVIDER ── */
  .orange-line {
    width: 60px;
    height: 3px;
    background: var(--nmi-orange);
    border-radius: 2px;
    margin: 1rem 0 0.5rem;
  }

  /* ── RULES STRIP ── */
  .rules-strip {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 2rem;
    margin: 1.5rem 0 2rem;
    padding: 0.75rem 2rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(244,121,32,0.2);
    border-radius: 8px;
  }

  .rule {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  .rule-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .rule-dot.win { background: #4cde9f; }
  .rule-dot.lose { background: #ff5555; }
  .rule span { color: var(--nmi-silver); }
  .rule strong { color: var(--nmi-white); }

  /* ── DICE STAGE ── */
  .dice-stage {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: center;
    gap: 3rem;
    margin-bottom: 2.5rem;
    perspective: 800px;
  }

  /* ── 3D DIE ── */
  .die-container {
    width: 110px;
    height: 110px;
    perspective: 600px;
  }

  .die-3d {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .die-3d.rolling {
    animation: tumble 0.7s cubic-bezier(0.4,0,0.2,1) infinite;
  }

  @keyframes tumble {
    0%   { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
    25%  { transform: rotateX(90deg) rotateY(45deg) rotateZ(15deg); }
    50%  { transform: rotateX(180deg) rotateY(180deg) rotateZ(90deg); }
    75%  { transform: rotateX(270deg) rotateY(270deg) rotateZ(180deg); }
    100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
  }

  .face {
    position: absolute;
    width: 110px;
    height: 110px;
    background: linear-gradient(145deg, #1e3560, #0d2040);
    border: 2px solid rgba(244,121,32,0.5);
    border-radius: 16px;
    display: grid;
    align-items: center;
    justify-items: center;
    backface-visibility: hidden;
  }

  /* Dot grid layout */
  .face .dots {
    display: grid;
    width: 72px;
    height: 72px;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 4px;
  }

  .dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--nmi-orange);
    box-shadow: 0 0 6px rgba(244,121,32,0.8);
    justify-self: center;
    align-self: center;
  }

  .dot.hidden { visibility: hidden; }

  /* Face positions */
  .face.front  { transform: translateZ(55px); }
  .face.back   { transform: rotateY(180deg) translateZ(55px); }
  .face.right  { transform: rotateY(90deg) translateZ(55px); }
  .face.left   { transform: rotateY(-90deg) translateZ(55px); }
  .face.top    { transform: rotateX(90deg) translateZ(55px); }
  .face.bottom { transform: rotateX(-90deg) translateZ(55px); }

  /* Face glow on reveal */
  .die-3d.winner .face.front {
    border-color: #4cde9f;
    box-shadow: 0 0 30px rgba(76,222,159,0.4);
  }

  .die-3d.loser .face.front {
    border-color: #ff5555;
    box-shadow: 0 0 20px rgba(255,85,85,0.3);
  }

  /* ── ROLL BUTTON ── */
  .roll-btn {
    position: relative;
    z-index: 10;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 16px 64px;
    background: var(--nmi-orange);
    color: var(--nmi-white);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    box-shadow: 0 4px 24px rgba(244,121,32,0.35);
    margin-bottom: 2rem;
  }

  .roll-btn:hover {
    background: var(--nmi-orange-light);
    box-shadow: 0 6px 36px rgba(244,121,32,0.5);
    transform: translateY(-2px);
  }

  .roll-btn:active { transform: scale(0.97) translateY(0); }
  .roll-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ── FOOTER ── */
  footer {
    position: relative;
    z-index: 10;
    margin-top: auto;
    padding: 1.5rem 2rem;
    font-size: 11px;
    color: rgba(136,153,187,0.5);
    letter-spacing: 0.1em;
    text-align: center;
  }

  /* ── OVERLAY MODAL ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(5, 12, 30, 0.88);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    backdrop-filter: blur(6px);
  }

  .overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--nmi-navy-mid);
    border-radius: 16px;
    padding: 3rem 3.5rem;
    text-align: center;
    position: relative;
    transform: scale(0.85);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    border: 1px solid rgba(255,255,255,0.08);
    max-width: 380px;
    width: 90%;
  }

  .overlay.show .modal {
    transform: scale(1);
  }

  .modal-icon {
    font-size: 56px;
    line-height: 1;
    margin-bottom: 1rem;
  }

  .modal-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 48px;
    font-weight: 900;
    letter-spacing: 0.04em;
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .modal-title.win { color: #4cde9f; }
  .modal-title.lose { color: #ff5555; }

  .modal-sub {
    font-size: 15px;
    color: var(--nmi-silver);
    margin-bottom: 2rem;
    line-height: 1.5;
  }

  .modal-dice-display {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .mini-die {
    width: 52px;
    height: 52px;
    border-radius: 10px;
    background: var(--nmi-navy);
    border: 2px solid var(--nmi-orange);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--nmi-orange);
  }

  .modal-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 12px 40px;
    background: transparent;
    color: var(--nmi-white);
    border: 1.5px solid rgba(255,255,255,0.25);
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .modal-btn:hover {
    border-color: var(--nmi-orange);
    background: rgba(244,121,32,0.1);
  }

  /* ── CONFETTI ── */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 200;
  }

  /* ── ACCENT LINES ── */
  .accent-bar {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 700px;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--nmi-orange), transparent);
    margin-bottom: 0;
    opacity: 0.6;
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<!-- HEADER -->
<header>
  <div class="logo-area">
    <!-- NMi logo inline SVG recreation -->
    <svg class="logo-svg" viewBox="0 0 160 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- N -->
      <text x="0" y="42" font-family="'Barlow Condensed', sans-serif" font-weight="900" font-size="46" fill="#1a3a7c">N</text>
      <!-- M -->
      <text x="30" y="42" font-family="'Barlow Condensed', sans-serif" font-weight="900" font-size="46" fill="#1a3a7c">M</text>
      <!-- i orange -->
      <text x="68" y="42" font-family="'Barlow Condensed', sans-serif" font-weight="900" font-size="46" fill="#f47920">i</text>
      <!-- tagline -->
      <text x="0" y="54" font-family="'Barlow', sans-serif" font-weight="500" font-size="7.2" fill="#888" letter-spacing="0.8">TRUSTED CYBERSECURITY LEADER</text>
    </svg>
    <div class="divider-v"></div>
    <div class="booth-label">
      <span class="top">Booth Experience</span>
      <span class="title">Lucky Dice</span>
    </div>
  </div>
</header>

<div class="orange-line"></div>
<span class="tagline" style="position:relative;z-index:10;">Roll the dice — test your luck</span>

<!-- RULES -->
<div class="rules-strip">
  <div class="rule">
    <div class="rule-dot win"></div>
    <span><strong>Double Pair</strong> = Winner</span>
  </div>
  <div class="rule">
    <div class="rule-dot lose"></div>
    <span><strong>Different</strong> = Loser</span>
  </div>
</div>

<!-- DICE -->
<div class="dice-stage">
  <div class="die-container">
    <div class="die-3d" id="die1">
      <div class="face front" id="d1-face">
        <div class="dots" id="d1-dots"></div>
      </div>
      <div class="face back"><div class="dots"></div></div>
      <div class="face right"><div class="dots"></div></div>
      <div class="face left"><div class="dots"></div></div>
      <div class="face top"><div class="dots"></div></div>
      <div class="face bottom"><div class="dots"></div></div>
    </div>
  </div>
  <div class="die-container">
    <div class="die-3d" id="die2">
      <div class="face front" id="d2-face">
        <div class="dots" id="d2-dots"></div>
      </div>
      <div class="face back"><div class="dots"></div></div>
      <div class="face right"><div class="dots"></div></div>
      <div class="face left"><div class="dots"></div></div>
      <div class="face top"><div class="dots"></div></div>
      <div class="face bottom"><div class="dots"></div></div>
    </div>
  </div>
</div>

<!-- BUTTON -->
<button class="roll-btn" id="rollBtn" onclick="rollDice()">Roll the Dice</button>

<!-- ACCENT -->
<div class="accent-bar"></div>

<!-- FOOTER -->
<footer>NMi &nbsp;·&nbsp; Trusted Cybersecurity Leader &nbsp;·&nbsp; Booth Experience</footer>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-icon" id="modal-icon"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="modal-dice-display">
      <div class="mini-die" id="mini1">–</div>
      <div class="mini-die" id="mini2">–</div>
    </div>
    <button class="modal-btn" onclick="closeModal()">Roll Again</button>
  </div>
</div>

<script>
// Dot layouts per face value (3x3 grid, index 0–8)
const DOT_MAPS = {
  1: [4],
  2: [2, 6],
  3: [2, 4, 6],
  4: [0, 2, 6, 8],
  5: [0, 2, 4, 6, 8],
  6: [0, 2, 3, 5, 6, 8]
};

function renderDots(container, value) {
  container.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (DOT_MAPS[value].includes(i) ? '' : ' hidden');
    container.appendChild(d);
  }
}

let rolling = false;
let finalV1, finalV2;

function rollDice() {
  if (rolling) return;
  rolling = true;

  const btn = document.getElementById('rollBtn');
  btn.disabled = true;

  const d1 = document.getElementById('die1');
  const d2 = document.getElementById('die2');
  const d1dots = document.getElementById('d1-dots');
  const d2dots = document.getElementById('d2-dots');

  d1.className = 'die-3d rolling';
  d2.className = 'die-3d rolling';
  d1.classList.remove('winner', 'loser');
  d2.classList.remove('winner', 'loser');

  let ticks = 0;
  const maxTicks = 18;

  const interval = setInterval(() => {
    renderDots(d1dots, Math.ceil(Math.random() * 6));
    renderDots(d2dots, Math.ceil(Math.random() * 6));
    ticks++;

    if (ticks >= maxTicks) {
      clearInterval(interval);
      finalV1 = Math.ceil(Math.random() * 6);
      finalV2 = Math.ceil(Math.random() * 6);
      renderDots(d1dots, finalV1);
      renderDots(d2dots, finalV2);

      const isWin = finalV1 === finalV2;
      const resultClass = isWin ? 'winner' : 'loser';

      d1.className = 'die-3d ' + resultClass;
      d2.className = 'die-3d ' + resultClass;

      setTimeout(() => {
        showModal(isWin, finalV1, finalV2);
        rolling = false;
      }, 500);
    }
  }, 65);
}

function showModal(isWin, v1, v2) {
  document.getElementById('modal-icon').textContent = isWin ? '🎉' : '🎲';
  document.getElementById('modal-title').textContent = isWin ? 'WINNER!' : 'Not This Time';
  document.getElementById('modal-title').className = 'modal-title ' + (isWin ? 'win' : 'lose');
  document.getElementById('modal-sub').textContent = isWin
    ? `Double ${v1}s! You rolled a matching pair — congratulations!`
    : `You rolled a ${v1} and a ${v2}. Better luck next time!`;
  document.getElementById('mini1').textContent = v1;
  document.getElementById('mini2').textContent = v2;
  document.getElementById('overlay').classList.add('show');

  if (isWin) launchConfetti();
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('rollBtn').disabled = false;
  stopConfetti();
}

// ── CONFETTI ENGINE ──
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let confettiPieces = [];
let confettiRunning = false;
let confettiRAF;

const COLORS = ['#f47920','#ff9a45','#4cde9f','#ffffff','#1a3a7c','#ffcc44','#ff5599'];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function randomBetween(a, b) { return a + Math.random() * (b - a); }

function launchConfetti() {
  confettiPieces = [];
  confettiRunning = true;
  for (let i = 0; i < 140; i++) {
    confettiPieces.push({
      x: randomBetween(canvas.width * 0.2, canvas.width * 0.8),
      y: randomBetween(-100, -10),
      w: randomBetween(7, 14),
      h: randomBetween(4, 8),
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      vx: randomBetween(-3, 3),
      vy: randomBetween(3, 8),
      angle: randomBetween(0, 360),
      spin: randomBetween(-4, 4),
      opacity: 1
    });
  }
  animateConfetti();
}

function animateConfetti() {
  if (!confettiRunning) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  let alive = false;
  for (const p of confettiPieces) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.12;
    p.angle += p.spin;
    if (p.y > canvas.height * 0.7) p.opacity -= 0.025;
    if (p.opacity > 0) {
      alive = true;
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.opacity);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    }
  }
  if (alive) confettiRAF = requestAnimationFrame(animateConfetti);
  else ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function stopConfetti() {
  confettiRunning = false;
  cancelAnimationFrame(confettiRAF);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// Initial render: show face 1 on both dice
renderDots(document.getElementById('d1-dots'), 1);
renderDots(document.getElementById('d2-dots'), 1);
</script>
</body>
</html>
